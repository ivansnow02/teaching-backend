syntax = "proto3";

package user;
option go_package = "./pb";

// 用户中心服务
service User {
    // 注册
    rpc Register(RegisterReq) returns(RegisterRes);
    // 登录
    rpc Login(LoginReq) returns(LoginRes);
    // 根据ID获取用户信息
    rpc FindById(FindByIdReq) returns(FindByIdRes);
    // 根据邮箱获取用户信息
    rpc FindByEmail(FindByEmailReq) returns(FindByEmailRes);
    // 发送验证码
    rpc SendVerifyCode(SendVerifyCodeReq) returns(SendVerifyCodeRes);
}

message RegisterReq {
    string email = 1;
    string password = 2;
    string code = 3; // 验证码
    int32 role = 4; // 1:学生 2:教师 3:管理员
}
message RegisterRes {
    int64 user_id = 1;
}

message LoginReq {
    string email = 1;
    string password = 2;
}
message LoginRes {
    int64 user_id = 1;
    int32 role = 2;
}

message FindByIdReq {
    int64 user_id = 1;
}
message FindByIdRes {
    int64 user_id = 1;
    string email = 2;
    string nickname = 3;
    string avatar = 4;
    int32 role = 5;
}

message FindByEmailReq {
    string email = 1;
}
message FindByEmailRes {
    int64 user_id = 1;
    string email = 2;
    string nickname = 3;
    string avatar = 4;
    int32 role = 5;
}

message SendVerifyCodeReq {
    string email = 1;
}
message SendVerifyCodeRes {}
