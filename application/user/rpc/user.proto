syntax = "proto3";

package user;
option go_package = "./pb";

// 用户中心服务（原子数据服务，只负责用户数据 CRUD）
service User {
    // 注册
  rpc Register(RegisterReq) returns(RegisterRes);
    // 根据ID获取用户信息
  rpc FindById(FindByIdReq) returns(FindByIdRes);
    // 根据邮箱获取用户信息
  rpc FindByEmail(FindByEmailReq) returns(FindByEmailRes);
    // 更新用户信息
  rpc UpdateUser(UpdateUserReq) returns(UpdateUserRes);
}

message RegisterReq {
  string email    = 1;
  string password = 2;
  int32  role     = 3; // 1:学生 2:教师 3:管理员
  string nickname = 4;
}

message RegisterRes {
  int64 user_id = 1;
}

message FindByIdReq {
  int64 user_id = 1;
}

message FindByIdRes {
  int64  user_id  = 1;
  string email    = 2;
  string nickname = 3;
  string avatar   = 4;
  int32  role     = 5;
}

message FindByEmailReq {
  string email = 1;
}

message FindByEmailRes {
  int64  user_id  = 1;
  string email    = 2;
  string nickname = 3;
  string avatar   = 4;
  int32  role     = 5;
  string password = 6;
}

message UpdateUserReq {
  int64  user_id  = 1;
  string nickname = 2;
  string avatar   = 3;
}

message UpdateUserRes {}
