syntax = "proto3";

package ai;
option go_package = "./pb";

service AiBridge {
  rpc GradeSubjectiveQuestion(GradeSubjectiveQuestionReq) returns(GradeSubjectiveQuestionRes);
  rpc GradeExamSubjective(GradeExamSubjectiveReq) returns(GradeExamSubjectiveRes);
  rpc EmbedMaterial(EmbedMaterialReq) returns(EmbedMaterialRes);
  rpc GetEmbedStatus(GetEmbedStatusReq) returns(GetEmbedStatusRes);
  rpc AskQuestion(AskQuestionReq) returns(AskQuestionRes);
  rpc AskQuestionStream(AskQuestionReq) returns(stream AskQuestionStreamRes);
  rpc GenerateQuestions(GenerateQuestionsReq) returns(GenerateTaskRes);
  rpc GenerateCourseOutline(GenerateCourseOutlineReq) returns(GenerateTaskRes);
  rpc GenerateCourseware(GenerateCoursewareReq) returns(GenerateTaskRes);
  rpc GenerateCoursewareStream(GenerateCoursewareReq) returns(stream GenerateCoursewareStreamRes);
  rpc GetAiTaskStatus(GetAiTaskStatusReq) returns(GetAiTaskStatusRes);
}

message SubjectiveQuestionInput {
  int64  record_id        = 1;
  int64  question_id      = 2;
  string question_content = 3;
  string standard_answer  = 4;
  string knowledge_points = 5;
  string user_answer      = 6;
  string max_score        = 7;
}

message GradeSubjectiveQuestionReq { SubjectiveQuestionInput input = 1; }

message GradeSubjectiveQuestionRes {
  int64  question_id = 1;
  string score       = 2;
  int32  is_correct  = 3;
  string ai_comment  = 4;
}

message GradeExamSubjectiveReq {
  int64                            record_id = 1;
  int64                            exam_id   = 2;
  int64                            user_id   = 3;
  repeated SubjectiveQuestionInput questions = 4;
}

message GradeExamSubjectiveRes { repeated GradeSubjectiveQuestionRes results = 1; }

message EmbedMaterialReq {
  int64  material_id = 1;
  int64  course_id   = 2;
  string title       = 3;
  string url         = 4;
  int32  type        = 5;
}

message EmbedMaterialRes { bool accepted = 1; }

message GetEmbedStatusReq { int64 material_id = 1; }

message GetEmbedStatusRes {
  int32  ai_status = 1;
  string message   = 2;
}

message AskQuestionReq {
  int64           course_id  = 1;
  int64           user_id    = 2;
  string          question   = 3;
  repeated string history    = 4;
  string          session_id = 5; // 多轮对话标识；为空则服务端新建会话
}

message AskQuestionRes {
  string          answer  = 1;
  repeated string sources = 2;
}

message AskQuestionStreamRes {
  string          delta      = 1;
  repeated string sources    = 2;
  bool            finished   = 3;
  string          session_id = 4; // 首帧返回，客户端保存用于后续多轮
}

message GenerateCoursewareStreamRes {
  string delta      = 1;
  bool   finished   = 2;
  string session_id = 3; // 首帧返回
}

message GenerateQuestionsReq {
  int64  course_id        = 1;
  string knowledge_points = 2;
  int32  count            = 3;
  int32  type             = 4;
  int32  difficulty       = 5;
}

message GeneratedQuestion {
  string content          = 1;
  string answer           = 2;
  string analysis         = 3;
  string knowledge_points = 4;
  string score            = 5;
  int32  type             = 6;
  int32  difficulty       = 7;
}

message GenerateCourseOutlineReq {
  int64  course_id    = 1;
  string topic        = 2;
  string requirements = 3;
}

message GenerateCoursewareReq {
  int64  chapter_id   = 1;
  string requirements = 2;
  int64  user_id      = 3; // 用于 session 隔离
  string session_id   = 4; // 多轮对话标识；为空则服务端新建会话
}

message GenerateTaskRes { string task_id = 1; }

message GetAiTaskStatusReq { string task_id = 1; }

message GetAiTaskStatusRes {
  int32  status  = 1;
  string result  = 2;
  string message = 3;
}
